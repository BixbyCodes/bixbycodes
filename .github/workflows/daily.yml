name: Daily Commit

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Make daily commit
        run: |
          echo "$(date)" >> daily.txt
          git config user.name "BixbyCodes"
          git config user.email "tripathiutsav87@gmail.com"
          git add daily.txt
          git commit -m "🟩 $(date +'%Y-%m-%d')"
          git push
