name: NASA APOD Tweet

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tweet:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch APOD and Tweet
        env:
          NASA_API_KEY: ${{ secrets.NASA_API_KEY }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
        run: |
          pip install requests requests-oauthlib --quiet

          python3 << 'EOF'
          import os, requests, textwrap
          from requests_oauthlib import OAuth1

          # Fetch NASA APOD
          res = requests.get(
            "https://api.nasa.gov/planetary/apod",
            params={"api_key": os.environ["NASA_API_KEY"]}
          ).json()

          title = res.get("title", "")
          explanation = res.get("explanation", "")
          url = res.get("url", "")

          short_exp = textwrap.shorten(explanation, width=160, placeholder="...")
          tweet = f"🔭 {title}\n\n{short_exp}\n\n🌌 {url}\n\n#Astronomy #Space #NASA #APOD"

          # Post via OAuth 1.0a directly
          auth = OAuth1(
            os.environ["TWITTER_API_KEY"],
            os.environ["TWITTER_API_SECRET"],
            os.environ["TWITTER_ACCESS_TOKEN"],
            os.environ["TWITTER_ACCESS_SECRET"]
          )

          response = requests.post(
            "https://api.twitter.com/2/tweets",
            json={"text": tweet[:280]},
            auth=auth
          )

          print(f"Status: {response.status_code}")
          print(response.json())

          if response.status_code == 201:
            print(f"✅ Tweeted: {title}")
          else:
            raise Exception(f"Failed: {response.text}")
          EOF
