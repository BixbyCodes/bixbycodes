name: NASA APOD Tweet

on:
  schedule:
    - cron: "0 7 * * *"  # every day at 7am UTC (12:30pm IST)
  workflow_dispatch:

jobs:
  tweet:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch APOD and Tweet
        env:
          NASA_API_KEY: ${{ secrets.NASA_API_KEY }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
        run: |
          pip install tweepy requests --quiet

          python3 << 'EOF'
          import requests, tweepy, textwrap

          # Fetch NASA APOD
          res = requests.get(f"https://api.nasa.gov/planetary/apod?api_key={__import__('os').environ['NASA_API_KEY']}").json()

          title = res.get("title", "")
          explanation = res.get("explanation", "")
          url = res.get("url", "")
          date = res.get("date", "")

          # Build tweet
          short_exp = textwrap.shorten(explanation, width=180, placeholder="...")
          tweet = f"🔭 {title}\n\n{short_exp}\n\n🌌 {url}\n\n#Astronomy #Space #APOD #NASA"

          # Post to X
          import os
          client = tweepy.Client(
            consumer_key=os.environ['TWITTER_API_KEY'],
            consumer_secret=os.environ['TWITTER_API_SECRET'],
            access_token=os.environ['TWITTER_ACCESS_TOKEN'],
            access_token_secret=os.environ['TWITTER_ACCESS_SECRET']
          )
          client.create_tweet(text=tweet[:280])
          print(f"✅ Tweeted: {title}")
          EOF
